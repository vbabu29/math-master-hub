# QUADRATIC FORMULA AND DISCRIMINANT QUESTION BANK

qf_disc_01:
  type: "Standard Form Identification"
  difficulty: "Easy"
  question: "Before using the quadratic formula, the equation must be in the form ax² + bx + c = 0. In the equation 3x² - 5 = 2x, what is the correct value of 'b' after moving terms?"
  options: ["2", "-2", "5", "-5"]
  answer: 1

qf_disc_02:
  type: "Discriminant Formula"
  difficulty: "Easy"
  question: "The 'discriminant' is the specific part of the quadratic formula found under the radical. Its formula is:"
  options: ["-b / 2a", "b² + 4ac", "b² - 4ac", "√(b² - 4ac)"]
  answer: 2

qf_disc_03:
  type: "Identifying Coefficients"
  difficulty: "Easy"
  question: "In the equation x² - 7x + 10 = 0, what is the value of the constant 'c'?"
