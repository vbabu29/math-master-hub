advanced_q20:
  type: "Modulus Case Analysis"
  difficulty: "Expert"
  category: "quadratic_formula"
  question: "Solve |x² - 3x + 2| = x - 1."
  options: 
    - "x = 1, x = 3"
    - "x = 1, x = 2, x = 3"
    - "x = 1"
    - "x = 3"
  answer: 0
  explanation: "Factor inside: |(x-1)(x-2)| = x-1. If x≥2 or x≤1, (x-1)(x-2) = x-1 => x-2=1 (x=3) or x-1=0 (x=1). If 1<x<2, -(x-1)(x-2) = x-1 => -x+2=1 (x=1, not in interval). Valid solutions are 1 and 3."


  