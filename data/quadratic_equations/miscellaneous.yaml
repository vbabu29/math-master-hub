    - "(cosx - 1)(2cosx - 5)"
  answer: 0
  explanation: "Substitute u = cosx. 2u² - 5u + 2 factors to (2u - 1)(u - 2). Replace u with cosx."

advanced_q13:
  type: "Reciprocal Equation"
  difficulty: "Expert"
  category: "quadratic_formula"
  question: "What substitution is typically used for the equation 2x⁴ + x³ - 6x² + x + 2 = 0?"
  options: 
    - "y = x²"
    - "y = x + 1/x"
    - "y = x - 1/x"
    - "y = 2x + 1"
  answer: 1
  explanation: "This is a symmetric reciprocal equation. Dividing by x² groups terms as 2(x² + 1/x²) + (x + 1/x) - 6 = 0, making y = x + 1/x the ideal choice."

advanced_q14:
  type: "Irrational Logic"
  difficulty: "Hard"
  category: "quadratic_formula"
  question: "Why does squaring √(2x - 1) = -5 yield an extraneous solution?"
