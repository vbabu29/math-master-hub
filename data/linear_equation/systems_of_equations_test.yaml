# --- UNIT 1: SYSTEMS LOGIC & VISUALIZATION (GUIDED) ---
# Targets: "Number of solutions in a system", "Consistent vs Inconsistent systems"

sys_q1:
  type: "Graphing Logic"
  difficulty: "Easy"
  question: "When two lines in a system are parallel and never touch, how many solutions does the system have?"
  options: ["One unique solution", "Exactly two solutions", "No solution", "Infinitely many solutions"]
  answer: 2

sys_q2:
  type: "Graphing Logic"
  difficulty: "Medium"
  question: "If two equations in a system represent the exact same line, the system is said to have:"
  options: ["No solution", "One solution at the origin", "Infinitely many solutions", "Two solutions"]
  answer: 2

sys_q3:
  type: "Visual Verification"
  difficulty: "Easy"
  question: "The solution to a system of equations on a graph is located at the ________ of the two lines."
  options: ["Y-intercept", "Intersection point", "X-intercept", "Midpoint"]
  answer: 1

sys_q4:
  type: "Solution Logic"
  difficulty: "Hard"
  question: "A system has one solution. If the first line has a slope of 3, which of the following MUST be true about the second line?"
  options: ["It must have a slope of -3", "It must have a slope other than 3", "It must have the same y-intercept", "It must be a vertical line"]
  answer: 1

# --- UNIT 2: CHOOSING THE BEST METHOD (GUIDED) ---
# Targets: "Substitution vs Elimination", "When to use substitution"

sys_q5:
  type: "Method Strategy"
  difficulty: "Medium"
  question: "For the system { y = 4x - 1 ; 2x + 3y = 10 }, which method is most efficient to use first?"
  options: ["Elimination", "Graphing", "Substitution", "Cross-multiplication"]
  answer: 2

sys_q6:
  type: "Elimination Setup"
  difficulty: "Medium"
  question: "To solve the system { 3x + y = 10 ; 2x - y = 5 } using elimination, what is the most logical first step?"
  options: ["Subtract the equations", "Add the equations to eliminate y", "Multiply the first equation by 2", "Solve for x in the second equation"]
  answer: 1

sys_q7:
  type: "Substitution Setup"
  difficulty: "Hard"
  question: "If you are solving { x = y + 2 ; 3x + y = 10 } by substitution, what should the second equation look like after the first step?"
  options: ["3(y + 2) + y = 10", "3y + 2 + y = 10", "x + (x - 2) = 10", "3(y - 2) + y = 10"]
  answer: 0

