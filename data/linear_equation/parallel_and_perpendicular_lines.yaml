# --- UNIT 1: PARALLEL LINE LOGIC (GUIDED) ---
# Targets: "Parallel lines slope", "Same slope property"

para_q1:
  type: "Logic Check"
  difficulty: "Easy"
  question: "Two lines are parallel if they are in the same plane and never intersect. Mathematically, this means their slopes must be:"
  options: ["Negative reciprocals", "The same", "Zero", "Added to equal 1"]
  answer: 1

para_q2:
  type: "Identification"
  difficulty: "Easy"
  question: "Line A has a slope of -5. If Line B is parallel to Line A, what is its slope?"
  options: ["5", "1/5", "-5", "-1/5"]
  answer: 2

para_q3:
  type: "Intercept Logic"
  difficulty: "Medium"
  question: "If two lines have the same slope AND the same y-intercept, which of the following is true?"
  options: ["They are parallel", "They are perpendicular", "They are the same line (coincident)", "They intersect once"]
  answer: 2

para_q4:
  type: "Visual Verification"
  difficulty: "Medium"
  question: "On a graph, Line 1 rises 3 units for every 2 units it moves right. Line 2 also rises 3 units for every 2 units it moves right. These lines are:"
  options: ["Parallel", "Perpendicular", "Intersecting at the origin", "Vertical"]
  answer: 0

# --- UNIT 2: PERPENDICULAR LINE LOGIC (GUIDED) ---
# Targets: "Negative reciprocal slope", "Perpendicular line property"

para_q5:
  type: "Negative Reciprocal Logic"
  difficulty: "Easy"
  question: "Perpendicular lines meet at a 90-degree angle. Their slopes are 'negative reciprocals,' meaning if one slope is a/b, the other is:"
  options: ["a/b", "-a/b", "b/a", "-b/a"]
  answer: 3

para_q6:
  type: "Calculation"
  difficulty: "Medium"
  question: "If a line has a slope of 4, what is the slope of a line that is perpendicular to it?"
  options: ["-4", "1/4", "-1/4", "4"]
  answer: 2

para_q7:
  type: "Product Property"
  difficulty: "Hard"
  question: "When you multiply the slopes of two perpendicular lines (that are not vertical or horizontal), the product is always:"
  options: ["0", "1", "-1", "undefined"]
  answer: 2

para_q8:
  type: "Guided Identification"
  difficulty: "Medium"
  question: "The slope of Line J is -2/7. To find the perpendicular slope, you flip the fraction and change the sign. What is the result?"
  options: ["-7/2", "7/2", "2/7", "7"]
  answer: 1

# --- UNIT 3: VERTICAL & HORIZONTAL RELATIONSHIPS ---
# Targets: "Perpendicular to x equals", "Slope of y equals"

para_q9:
  type: "Special Cases"
  difficulty: "Medium"
  question: "Which type of line is parallel to the horizontal line y = 10?"
  options: ["x = 10", "y = -2", "x = 0", "y = x"]
  answer: 1

para_q10:
  type: "Special Cases"
  difficulty: "Hard"
  question: "Which of the following is perpendicular to the vertical line x = -4?"
  options: ["x = 4", "y = 4", "y = x", "x = 0"]
  answer: 1

para_q11:
  type: "Slope Logic"
  difficulty: "Hard"
  question: "A line with a slope of 0 (horizontal) is always perpendicular to a line with what kind of slope?"
  options: ["0", "1", "-1", "Undefined (vertical)"]
  answer: 3

# --- UNIT 4: ERROR DETECTION & VERIFICATION ---

para_q12:
  type: "Error Analysis"
  difficulty: "Medium"
  question: "A student says y = 2x + 5 and y = -2x + 3 are perpendicular. What is their mistake?"
  options: ["They forgot to flip the fraction", "They shouldn't have changed the sign", "Slopes must be the same", "One intercept must be 0"]
  answer: 0

para_q13:
  type: "Verification"
  difficulty: "Hard"
  question: "Are the lines 2x + 3y = 6 and 3x - 2y = 8 perpendicular?"
  options: ["No, both are positive", "Yes, slopes are -2/3 and 3/2", "No, slopes are 2/3 and 3/2", "Yes, they have different intercepts"]
  answer: 1

