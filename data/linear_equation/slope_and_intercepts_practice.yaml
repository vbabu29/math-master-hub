# --- UNIT 1: THE CONCEPT OF SLOPE (GUIDED) ---
# Targets: "What is slope", "Rise over run", "Types of slope"

slope_q1:
  type: "Definition"
  difficulty: "Easy"
  question: "In the context of a graph, slope is often described as the ratio of the vertical change to the horizontal change. What is the common nickname for this?"
  options: ["Run over Rise", "Across over Up", "Rise over Run", "Start over Finish"]
  answer: 2

slope_q2:
  type: "Visual Logic"
  difficulty: "Easy"
  question: "If a line goes 'downhill' from left to right, what kind of slope does it have?"
  options: ["Positive", "Zero", "Undefined", "Negative"]
  answer: 3

slope_q3:
  type: "Visual Logic"
  difficulty: "Easy"
  question: "A line that is perfectly flat (horizontal) has which type of slope?"
  options: ["Zero", "Positive", "Undefined", "Negative"]
  answer: 0

slope_q4:
  type: "Visual Logic"
  difficulty: "Easy"
  question: "A line that goes straight up and down (vertical) has which type of slope?"
  options: ["Zero", "Negative", "Undefined", "Positive"]
  answer: 2

