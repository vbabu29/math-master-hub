# --- UNIT 1: GEOMETRY & AREA (GUIDED) ---
# Targets: "Area of a rectangle word problems", "Factoring in geometry"

wp_q1:
  type: "Area Analysis"
  difficulty: "Easy"
  question: "A rectangle has an area represented by x² + 5x + 6. If the area is length times width, which dimensions are possible?"
  options: ["(x + 1) and (x + 6)", "(x + 2) and (x + 3)", "(x + 2) and (x + 4)", "(x - 2) and (x - 3)"]
  answer: 1

wp_q2:
  type: "Finding Width"
  difficulty: "Medium"
  question: "The area of a rug is x² + 7x + 10. If the length is (x + 5), what is the width?"
  options: ["(x + 2)", "(x + 5)", "(x + 10)", "(x + 7)"]
  answer: 0

wp_q3:
  type: "Square Dimensions"
  difficulty: "Medium"
  question: "A square garden has an area of x² + 6x + 9. What is the length of one side?"
  options: ["(x + 9)", "(x + 6)", "(x + 3)", "(x + 3)²"]
  answer: 2

wp_q4:
  type: "Unknown Side"
  difficulty: "Hard"
  question: "A picture frame has an area of x² - x - 12. If one side is (x - 4), what must the other side be?"
  options: ["(x - 3)", "(x + 4)", "(x + 1)", "(x + 3)"]
  answer: 3

# --- UNIT 2: PROJECTILE MOTION & PHYSICS (GUIDED) ---
# Targets: "Vertical motion problems", "When does the ball hit the ground"

wp_q5:
  type: "Ground Impact"
  difficulty: "Medium"
  question: "The height of a ball is given by h(t) = -16(t - 3)(t + 1). At what positive time 't' does the ball hit the ground (height = 0)?"
  options: ["t = 1 second", "t = 3 seconds", "t = -1 second", "t = 0 seconds"]
  answer: 1

wp_q6:
  type: "Initial Height Logic"
  difficulty: "Hard"
  question: "A rocket is launched. Its height is h = -16t² + 64t + 80. After factoring out the GCF (-16), you get -16(t² - 4t - 5). What are the roots of this motion?"
  options: ["t = 5 and t = -1", "t = 4 and t = 5", "t = 2 and t = 8", "t = -5 and t = 1"]
  answer: 0

wp_q7:
  type: "Interpretation"
  difficulty: "Medium"
  question: "If a projectile's height is factored as h = -16(t - 4)(t + 0.5), why do we ignore the root t = -0.5?"
  options: ["Time cannot be a decimal", "The ball never hits that point", "Time cannot be negative in this context", "The equation is prime"]
  answer: 2

# --- UNIT 3: NUMBER THEORY & INTEGERS (GUIDED) ---
# Targets: "Consecutive integer word problems", "Product of two numbers"

wp_q8:
  type: "Consecutive Integers"
  difficulty: "Medium"
  question: "The product of two consecutive positive integers is 42. This forms the equation x² + x - 42 = 0. Which pair of integers is the solution?"
  options: ["5 and 6", "6 and 7", "7 and 8", "21 and 2"]
  answer: 1

wp_q9:
  type: "Integer Logic"
  difficulty: "Hard"
  question: "The product of two consecutive even integers is 80. If x represents the smaller integer, the equation is x(x + 2) = 80. What is the smaller integer?"
  options: ["10", "12", "8", "6"]
  answer: 2

wp_q10:
  type: "Sum and Product"
  difficulty: "Easy"
  question: "Two numbers add to 10 and multiply to 21. What are the numbers?"
  options: ["2 and 8", "4 and 6", "5 and 5", "3 and 7"]
  answer: 3

