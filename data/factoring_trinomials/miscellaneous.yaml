# Unit 6: Verification [Total: 5]

ver_q1:
  type: "Reverse Check"
  difficulty: "Easy"
  question: |
    x² + 6x + 8

    Is the factorization correct?
    (x+4)(x+2)
  options: ["Yes", "No, product is wrong", "No, sum is wrong", "No, signs are wrong"]
  answer: 0

ver_q2:
  type: "Reverse Check"
  difficulty: "Easy"
  question: |
    x² - 5x - 6

    Is the factorization correct?
    (x-6)(x+1)
  options: ["Yes", "No, product is wrong", "No, sum should be 5", "No, variables cannot repeat"]
  answer: 0

ver_q3:
  type: "Reverse Check"
  difficulty: "Easy"
  question: |
    x² - 2x - 15

    Is the factorization correct?
    (x+5)(x-3)
  options: ["Yes", "No, sum should be -2 but is +2", "No, product is wrong", "No, signs are wrong"]
  answer: 1

ver_q4:
  type: "Error Detection"
  difficulty: "Medium"
  question: |
    x² - 13x + 40

    A student factors it as (x-10)(x-4).

    Why is this wrong?
  options: ["Product is -40", "Sum is -14, not -13", "Signs must be different", "It is correct"]
