# Unit 8: Word Problems / Applications [Total: 6]

wp_q1:
  type: "Area and Perimeter"
  difficulty: "Easy"
  question: |
    A rectangle has area x² + 5x + 6 (square units).

    Factoring gives
    (x+2)(x+3)

    What are possible dimensions?
  options: ["(x+1) and (x+6)", "(x+2) and (x+3)", "(x+2) and (x+4)", "(x+3) and (x+4)"]
  answer: 1

wp_q2:
  type: "Area and Perimeter"
  difficulty: "Medium"
  question: |
    A garden has area x² + 7x + 12.
    The length is (x+4).

    What is the width in factored form?
  options: ["(x+2)", "(x+3)", "(x+4)", "(x+6)"]
  answer: 1

wp_q3:
  type: "Projectile Motion"
  difficulty: "Medium"
  question: |
    The height (feet) of a ball thrown upward is
    h(t) = -16t² + 32t + 48

    Factoring gives
    -16(t-3)(t+1)

    When does the ball hit the ground?
  options: ["t = 1 second", "t = 3 seconds", "t = -1 second", "t = 48 seconds"]
  answer: 1

wp_q4:
  type: "Projectile Motion"
  difficulty: "Hard"
  question: |
    The height (feet) of a ball thrown upward is
    h(t) = -16t² + 64t
    (t = time in seconds)

    Factoring gives
    -16t(t-4)

    What does t = 4 represent?
  options: ["Initial height", "Maximum height", "When the ball hits the ground", "Time at 1 second"]
  answer: 2

wp_q5:
  type: "Consecutive Integers"
  difficulty: "Medium"
  question: |
    The product of two consecutive integers is 42.

    Setting up x(x+1) = 42 leads to
    x² + x - 42 = 0

    Factoring gives (x+7)(x-6).

    What are the two positive integers?
  options: ["5 and 6", "6 and 7", "7 and 8", "-7 and -6"]
  answer: 1

wp_q6:
  type: "Consecutive Integers"
  difficulty: "Hard"
  question: |
    The product of two consecutive even integers is 48.

    If the smaller is 2x, we get 2x(2x+2) = 48
    Giving 4x² + 4x - 48 = 0

    Which pair solves this?
  options: ["4 and 6", "6 and 8", "-8 and -6", "8 and 10"]
  answer: 1