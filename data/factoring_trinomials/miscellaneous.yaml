# Unit 1: Basic Trinomials (a=1) [Total: 6]
basic_q1:
  type: "Direct Factoring"
  difficulty: "Easy"
  question: "Factor: x² + 5x + 6"
  options: ["(x+2)(x+3)", "(x+1)(x+6)", "(x+2)(x+4)", "(x+3)(x+4)"]
  answer: 0

basic_q2:
  type: "Missing Number"
  difficulty: "Easy"
  question: "x² + 9x + 14 = (x + __)(x + 7)"
  options: ["1", "2", "4", "9"]
  answer: 1

basic_q3:
  type: "Identify Middle Term"
  difficulty: "Easy"
  question: "(x + 3)(x + 5) = x² + __x + 15"
  options: ["6", "8", "15", "3"]
  answer: 1

basic_q4:
  type: "Select the Pair"
  difficulty: "Medium"
  question: "Which pair multiplies to -20 and adds to -1?"
  options: ["-10, 2", "5, -4", "-5, 4", "10, -2"]
  answer: 2

basic_q5:
  type: "Matching Trinomial"
  difficulty: "Medium"
  question: "Which trinomial equals (x + 2)(x - 5)?"
  options: ["x² - 3x - 10", "x² - 7x - 10", "x² + 3x - 10", "x² - 3x + 10"]
  answer: 0

basic_q6:
  type: "Factorable or Not"
  difficulty: "Hard"
  question: "Which trinomial cannot be factored using integers?"
  options: ["x² + 7x + 10", "x² - 5x + 6", "x² + 4x + 7", "x² - 3x - 10"]
  answer: 2


# Unit 2: GCF First [Total: 5]

gcf_q1:
  type: "Direct Factoring"
  difficulty: "Easy"
  question: "Factor: 3x² + 6x + 3"
  options: ["3(x+1)²", "(x+1)²", "3(x+3)(x+1)", "3(x+2)(x+1)"]
  answer: 0

gcf_q2:
  type: "Missing Number"
  difficulty: "Easy"
  question: "2x² - 18 = 2(x - 3)(x + __)"
  options: ["2", "3", "9", "18"]
  answer: 1

gcf_q3:
  type: "Error Detection"
  difficulty: "Medium"
  question: |
    A student writes
    4x² + 20x + 24 = (2x + 4)(2x + 6)

    What step did they miss?
  options: ["To factor out the GCF 4 first", "To multiply 4 and 6", "The middle term is wrong", "Variables cannot repeat"]
  answer: 0

gcf_q4:
  type: "Identify Middle Term"
  difficulty: "Medium"
  question: "5(x² + 4x - 12) = 5x² + __x - 60"
  options: ["4", "20", "12", "5"]
  answer: 1

gcf_q5:
  type: "Direct Factoring"
  difficulty: "Hard"
  question: "Factor: 3x³ - 21x² + 30x"
  options: ["3x(x-5)(x-2)", "3(x-5)(x-2)", "3x(x+5)(x+2)", "x(3x-10)(x-3)"]
  answer: 0


